<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OWA Notifier</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 16px;
      gap: 16px;
    }

    .header {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4a4a5a;
      flex-shrink: 0;
      transition: background 0.4s, box-shadow 0.4s;
    }
    .dot.active {
      background: #22d3a5;
      box-shadow: 0 0 8px #22d3a588;
    }
    .dot.error {
      background: #f87171;
      box-shadow: 0 0 8px #f8717188;
    }

    .title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #94a3b8;
      text-transform: uppercase;
    }

    .status-card {
      width: 100%;
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .status-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .status-text {
      font-size: 13px;
      color: #cbd5e1;
      line-height: 1.5;
    }

    .event-card {
      width: 100%;
      background: #1a1f35;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 14px 16px;
      display: none;
      flex-direction: column;
      gap: 6px;
    }
    .event-card.visible { display: flex; }

    .event-card .event-subject {
      font-size: 14px;
      font-weight: 600;
      color: #e2e8f0;
    }
    .event-card .event-time {
      font-size: 12px;
      color: #94a3b8;
    }
    .event-card .event-location {
      font-size: 12px;
      color: #64748b;
    }
    .event-card .event-countdown {
      font-size: 13px;
      font-weight: 600;
      color: #fbbf24;
      margin-top: 2px;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: #22d3a5;
      color: #0f1117;
    }
    .btn-secondary {
      background: #1e2130;
      color: #94a3b8;
      border: 1px solid #2d3148;
    }

    .log {
      width: 100%;
      background: #13151f;
      border: 1px solid #1e2130;
      border-radius: 8px;
      padding: 10px 12px;
      max-height: 120px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .log-entry {
      font-size: 11px;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      color: #64748b;
      line-height: 1.4;
    }
    .log-entry.new { color: #22d3a5; }
    .log-entry.err { color: #f87171; }
    .log-entry.warn { color: #fbbf24; }

    .counter {
      display: flex;
      width: 100%;
      gap: 8px;
    }
    .counter-item {
      flex: 1;
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
    }
    .counter-num {
      font-size: 22px;
      font-weight: 700;
      color: #e2e8f0;
      line-height: 1;
    }
    .counter-label {
      font-size: 10px;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="dot" id="dot"></div>
  <span class="title">OWA Notifier</span>
</div>

<div class="status-card">
  <span class="status-label">Статус</span>
  <span class="status-text" id="statusText">Инициализация...</span>
</div>

<div class="counter">
  <div class="counter-item">
    <div class="counter-num" id="eventCount">0</div>
    <div class="counter-label">Встреч на ближайший час</div>
  </div>
  <div class="counter-item">
    <div class="counter-num" id="notifCount">0</div>
    <div class="counter-label">Уведомлений</div>
  </div>
</div>

<div class="event-card" id="nextEvent">
  <span class="status-label">Ближайшее событие</span>
  <span class="event-subject" id="eventSubject"></span>
  <span class="event-time" id="eventTime"></span>
  <span class="event-location" id="eventLocation"></span>
  <span class="event-countdown" id="eventCountdown"></span>
</div>

<button class="btn btn-primary" id="btnPermission" disabled>
  Разрешить уведомления
</button>

<button class="btn btn-secondary" id="btnToggle" disabled>
  Остановить мониторинг
</button>

<div class="log" id="log"></div>

<script>
  // ─── состояние ───────────────────────────────────────────────────────────
  let isRunning = false;
  let pollTimer = null;
  let notifiedEventIds = new Set();
  let notifCount = 0;
  let eventCount = 0;
  const POLL_INTERVAL = 30_000; // 30 секунд
  const NOTIFY_BEFORE_MIN = 15;

  // ─── UI хелперы ──────────────────────────────────────────────────────────
  function setStatus(text, state) {
    document.getElementById('statusText').textContent = text;
    const dot = document.getElementById('dot');
    dot.className = 'dot' + (state ? ' ' + state : '');
  }

  function addLog(text, type = '') {
    const log = document.getElementById('log');
    const entry = document.createElement('div');
    entry.className = 'log-entry' + (type ? ' ' + type : '');
    const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    entry.textContent = `[${time}] ${text}`;
    log.prepend(entry);
    while (log.children.length > 50) log.lastChild.remove();
  }

  function updateCounters() {
    document.getElementById('eventCount').textContent = eventCount;
    document.getElementById('notifCount').textContent = notifCount;
  }

  function showNextEvent(event) {
    const card = document.getElementById('nextEvent');
    if (!event) {
      card.classList.remove('visible');
      return;
    }
    card.classList.add('visible');
    document.getElementById('eventSubject').textContent = event.subject;

    const startTime = new Date(event.start);
    const endTime = new Date(event.end);
    const timeFmt = { hour: '2-digit', minute: '2-digit' };
    document.getElementById('eventTime').textContent =
      startTime.toLocaleTimeString('ru-RU', timeFmt) + ' — ' + endTime.toLocaleTimeString('ru-RU', timeFmt);

    document.getElementById('eventLocation').textContent = event.location || '';

    const minutesLeft = Math.round((startTime - new Date()) / 60000);
    if (minutesLeft <= 0) {
      document.getElementById('eventCountdown').textContent = 'Уже началось';
    } else {
      document.getElementById('eventCountdown').textContent = `Через ${minutesLeft} мин`;
    }
  }

  // ─── уведомления браузера ─────────────────────────────────────────────────
  async function requestNotificationPermission() {
    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
      addLog('Разрешение на уведомления получено', 'new');
      document.getElementById('btnPermission').disabled = true;
      document.getElementById('btnToggle').disabled = false;
      startPolling();
    } else {
      addLog('Разрешение на уведомления отклонено', 'err');
      setStatus('Нет разрешения на уведомления', 'error');
    }
  }

  function showNotification(title, body) {
    if (Notification.permission !== 'granted') return;
    const n = new Notification(title, {
      body,
      icon: 'https://res.cdn.office.net/files/fabric-cdn-prod_20230815.002/assets/brand-icons/product/svg/outlook_32x1.svg',
      tag: 'owa-notifier-' + Date.now(),
    });
    n.onclick = () => { window.focus(); n.close(); };
    notifCount++;
    updateCounters();
  }

  // ─── EWS запрос ──────────────────────────────────────────────────────────
  function buildCalendarRequest() {
    const now = new Date();
    const later = new Date(now.getTime() + 60 * 60 * 1000); // +60 минут
    const startDate = now.toISOString();
    const endDate = later.toISOString();

    return `<?xml version="1.0" encoding="utf-8"?>
<soap:Envelope xmlns:soap="http://schemas.xmlsoap.org/soap/envelope/"
               xmlns:t="http://schemas.microsoft.com/exchange/services/2006/types"
               xmlns:m="http://schemas.microsoft.com/exchange/services/2006/messages">
  <soap:Body>
    <m:FindItem Traversal="Shallow">
      <m:ItemShape>
        <t:BaseShape>IdOnly</t:BaseShape>
        <t:AdditionalProperties>
          <t:FieldURI FieldURI="item:Subject"/>
          <t:FieldURI FieldURI="calendar:Start"/>
          <t:FieldURI FieldURI="calendar:End"/>
          <t:FieldURI FieldURI="calendar:Location"/>
          <t:FieldURI FieldURI="calendar:Organizer"/>
        </t:AdditionalProperties>
      </m:ItemShape>
      <m:CalendarView StartDate="${startDate}" EndDate="${endDate}"/>
      <m:ParentFolderIds>
        <t:DistinguishedFolderId Id="calendar"/>
      </m:ParentFolderIds>
    </m:FindItem>
  </soap:Body>
</soap:Envelope>`;
  }

  function parseCalendarResponse(xml) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, 'text/xml');

    const fault = doc.querySelector('faultstring');
    if (fault) throw new Error('SOAP fault: ' + fault.textContent);

    const responseClass = doc.querySelector('FindItemResponse')?.getAttribute('ResponseClass')
      || doc.querySelector('[ResponseClass]')?.getAttribute('ResponseClass');

    if (responseClass === 'Error') {
      const msg = doc.querySelector('MessageText')?.textContent || 'EWS error';
      throw new Error(msg);
    }

    const items = doc.querySelectorAll('CalendarItem');
    const result = [];
    items.forEach(item => {
      const id = item.querySelector('ItemId')?.getAttribute('Id');
      const subject = item.querySelector('Subject')?.textContent || '(без темы)';
      const start = item.querySelector('Start')?.textContent;
      const end = item.querySelector('End')?.textContent;
      const location = item.querySelector('Location')?.textContent || '';
      if (id && start) result.push({ id, subject, start, end, location });
    });

    // сортируем по времени начала
    result.sort((a, b) => new Date(a.start) - new Date(b.start));
    return result;
  }

  // ─── очистка notifiedEventIds от прошедших встреч ────────────────────────
  function cleanupNotifiedIds(events) {
    const currentIds = new Set(events.map(e => e.id));
    for (const id of notifiedEventIds) {
      if (!currentIds.has(id)) {
        notifiedEventIds.delete(id);
      }
    }
  }

  // ─── polling ─────────────────────────────────────────────────────────────
  function poll() {
    if (!isRunning) return;

    setStatus('Проверяю календарь...', 'active');

    Office.context.mailbox.makeEwsRequestAsync(
      buildCalendarRequest(),
      (result) => {
        if (!isRunning) return;

        if (result.status === Office.AsyncResultStatus.Failed) {
          addLog('EWS ошибка: ' + result.error.message, 'err');
          setStatus('Ошибка EWS — жду следующей попытки', 'error');
          scheduleNext();
          return;
        }

        try {
          const events = parseCalendarResponse(result.value);
          eventCount = events.length;
          updateCounters();

          cleanupNotifiedIds(events);

          // показать ближайшее событие
          showNextEvent(events.length > 0 ? events[0] : null);

          const now = new Date();
          let notifiedThisRound = 0;

          events.forEach(event => {
            const startTime = new Date(event.start);
            const minutesLeft = (startTime - now) / 60000;

            if (minutesLeft <= NOTIFY_BEFORE_MIN && minutesLeft > 0 && !notifiedEventIds.has(event.id)) {
              notifiedEventIds.add(event.id);
              const minText = Math.round(minutesLeft);
              addLog(`Встреча через ${minText} мин: ${event.subject}`, 'new');
              showNotification(
                `Встреча через ${minText} мин`,
                `${event.subject}${event.location ? '\n' + event.location : ''}`
              );
              notifiedThisRound++;
            }
          });

          if (notifiedThisRound === 0) {
            addLog(`Встреч в ближайший час: ${events.length}`);
          }

          setStatus(`Мониторинг календаря активен · ${new Date().toLocaleTimeString('ru-RU')}`, 'active');
        } catch (e) {
          addLog('Ошибка разбора ответа: ' + e.message, 'err');
          setStatus('Ошибка разбора EWS ответа', 'error');
        }

        scheduleNext();
      }
    );
  }

  function scheduleNext() {
    if (isRunning) {
      pollTimer = setTimeout(poll, POLL_INTERVAL);
    }
  }

  function startPolling() {
    if (isRunning) return;
    isRunning = true;
    notifiedEventIds.clear();
    addLog('Мониторинг календаря запущен', 'new');
    setStatus('Запускаю мониторинг календаря...', 'active');
    document.getElementById('btnToggle').textContent = 'Остановить мониторинг';
    poll();
  }

  function stopPolling() {
    isRunning = false;
    clearTimeout(pollTimer);
    addLog('Мониторинг остановлен', 'warn');
    setStatus('Мониторинг остановлен', '');
    document.getElementById('dot').className = 'dot';
    document.getElementById('btnToggle').textContent = 'Запустить мониторинг';
  }

  function togglePolling() {
    if (isRunning) stopPolling();
    else startPolling();
  }

  // ─── Office.js init ───────────────────────────────────────────────────────
  Office.onReady((info) => {
    if (info.host !== Office.HostType.Outlook) {
      setStatus('Только для Outlook / OWA', 'error');
      return;
    }

    addLog('Office.js готов');

    if (Notification.permission === 'granted') {
      addLog('Разрешение уже есть — запускаю мониторинг', 'new');
      document.getElementById('btnPermission').disabled = true;
      document.getElementById('btnToggle').disabled = false;
      startPolling();
    } else if (Notification.permission === 'denied') {
      setStatus('Уведомления заблокированы в браузере', 'error');
      addLog('Уведомления заблокированы — разреши в настройках браузера', 'err');
    } else {
      setStatus('Нажми кнопку для разрешения уведомлений', '');
      document.getElementById('btnPermission').disabled = false;
    }

    document.getElementById('btnPermission').addEventListener('click', requestNotificationPermission);
    document.getElementById('btnToggle').addEventListener('click', togglePolling);
  });
</script>
</body>
</html>
